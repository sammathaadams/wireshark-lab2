<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="640" fill="#f4f6fb" rx="12"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a2340">Wireshark Lab 2 — Azure Architecture</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#5a6a8a">VM: ws01 · OS: Windows Server 2025 Datacenter x64 Gen2 · Region: West US 2</text>

  <!-- ====== AZURE CLOUD BOUNDARY ====== -->
  <rect x="20" y="72" width="880" height="330" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="36" y="94" font-size="13" font-weight="600" fill="#4285f4">☁  Microsoft Azure</text>

  <!-- Resource Group box -->
  <rect x="40" y="104" width="840" height="284" rx="8" fill="#dce8fd" stroke="#5a9cf5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="58" y="122" font-size="11" font-weight="600" fill="#1a73e8">Resource Group: rg-lab02-0626</text>

  <!-- VNet box -->
  <rect x="60" y="132" width="500" height="240" rx="8" fill="#c8ddfb" stroke="#4285f4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="78" y="150" font-size="11" font-weight="600" fill="#1a73e8">Virtual Network: ws01-vnet</text>

  <!-- NSG badge inside vnet -->
  <rect x="78" y="158" width="180" height="36" rx="6" fill="#ffffff" stroke="#ea4335" stroke-width="1.5"/>
  <text x="88" y="172" font-size="10" font-weight="600" fill="#ea4335">🛡  NSG: ws01-nsg</text>
  <text x="88" y="186" font-size="9" fill="#555">RDP TCP 3389 allowed</text>

  <!-- VM box -->
  <rect x="78" y="204" width="460" height="152" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="2"/>
  <!-- VM header bar -->
  <rect x="78" y="204" width="460" height="30" rx="8" fill="#34a853"/>
  <text x="308" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">🖥  Virtual Machine: ws01</text>

  <!-- VM details -->
  <text x="100" y="252" font-size="11" fill="#1a2340" font-weight="600">Role:</text>
  <text x="148" y="252" font-size="11" fill="#444">Wireshark Analysis Station</text>
  <text x="100" y="270" font-size="11" fill="#1a2340" font-weight="600">OS:</text>
  <text x="148" y="270" font-size="11" fill="#444">Windows Server 2025 Datacenter x64 Gen2</text>
  <text x="100" y="288" font-size="11" fill="#1a2340" font-weight="600">Size:</text>
  <text x="148" y="288" font-size="11" fill="#444">Standard_D2s_v3 (2 vCPU · 8 GiB RAM)</text>
  <text x="100" y="306" font-size="11" fill="#1a2340" font-weight="600">Services:</text>
  <text x="168" y="306" font-size="11" fill="#444">Wireshark · tshark · Npcap</text>
  <text x="100" y="324" font-size="11" fill="#1a2340" font-weight="600">Access:</text>
  <text x="148" y="324" font-size="11" fill="#444">RDP (port 3389)</text>
  <text x="100" y="342" font-size="11" fill="#1a2340" font-weight="600">Automation:</text>
  <text x="188" y="342" font-size="11" fill="#444">Start-HttpTestServer.ps1 · Invoke-TsharkCapture.ps1</text>

  <!-- Subscription badge -->
  <rect x="590" y="132" width="270" height="60" rx="6" fill="#ffffff" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="608" y="152" font-size="11" font-weight="600" fill="#f9a825">📋  Subscription</text>
  <text x="608" y="168" font-size="11" fill="#444">Azure subscription 1</text>
  <text x="608" y="184" font-size="10" fill="#888">az group create --location eastus</text>

  <!-- Admin Workstation box -->
  <rect x="590" y="208" width="270" height="60" rx="6" fill="#ffffff" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="608" y="228" font-size="11" font-weight="600" fill="#9c27b0">💻  Admin Workstation</text>
  <text x="608" y="244" font-size="11" fill="#444">Azure CLI + Remote Desktop (RDP)</text>
  <text x="608" y="260" font-size="10" fill="#888">az vm create · mstsc → ws01:3389</text>

  <!-- GitHub box -->
  <rect x="590" y="284" width="270" height="52" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="608" y="304" font-size="11" font-weight="600" fill="#333">⚙  GitHub Repository</text>
  <text x="608" y="320" font-size="10" fill="#555">sammathaadams/wireshark-lab2</text>
  <text x="608" y="334" font-size="10" fill="#888">scripts/ · screenshots/ · .pcapng captures</text>

  <!-- Arrow: Admin → VM -->
  <line x1="590" y1="238" x2="542" y2="290" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

  <!-- ====== WIRESHARK ANALYSIS PIPELINE ====== -->
  <rect x="20" y="416" width="880" height="208" rx="10" fill="#e8f5e9" stroke="#34a853" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="36" y="438" font-size="13" font-weight="600" fill="#34a853">🔬  Wireshark Analysis Pipeline — ws01</text>

  <!-- NIC capture root node -->
  <rect x="350" y="448" width="220" height="34" rx="6" fill="#34a853"/>
  <text x="460" y="469" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">NIC → Wireshark Engine</text>

  <!-- Exercise A — DNS -->
  <rect x="42" y="508" width="178" height="100" rx="6" fill="#ffffff" stroke="#1a73e8" stroke-width="1.5"/>
  <rect x="42" y="508" width="178" height="22" rx="6" fill="#1a73e8"/>
  <text x="131" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Exercise A — DNS Lookup</text>
  <text x="58" y="546" font-size="9" fill="#333">🔍 Filter: dns</text>
  <text x="58" y="560" font-size="9" fill="#555">  nslookup google.com</text>
  <text x="58" y="574" font-size="9" fill="#333">📄 A record query + response</text>
  <text x="58" y="588" font-size="9" fill="#888">  Matching transaction IDs</text>

  <!-- Exercise B — TCP Handshake -->
  <rect x="240" y="508" width="178" height="100" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
  <rect x="240" y="508" width="178" height="22" rx="6" fill="#34a853"/>
  <text x="329" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Exercise B — TCP Handshake</text>
  <text x="256" y="546" font-size="9" fill="#333">🔍 Filter: tcp and ip.addr==X</text>
  <text x="256" y="560" font-size="9" fill="#555">  http://example.com</text>
  <text x="256" y="574" font-size="9" fill="#333">📄 SYN → SYN-ACK → ACK</text>
  <text x="256" y="588" font-size="9" fill="#888">  Connectivity diagnosis</text>

  <!-- Exercise C — Cleartext Creds -->
  <rect x="438" y="508" width="178" height="100" rx="6" fill="#ffffff" stroke="#ea4335" stroke-width="1.5"/>
  <rect x="438" y="508" width="178" height="22" rx="6" fill="#ea4335"/>
  <text x="527" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Exercise C — Cleartext Creds</text>
  <text x="454" y="546" font-size="9" fill="#333">🔍 Filter: http.request.method==POST</text>
  <text x="454" y="560" font-size="9" fill="#555">  Start-HttpTestServer.ps1</text>
  <text x="454" y="574" font-size="9" fill="#333">📄 HTML Form URL Encoded</text>
  <text x="454" y="588" font-size="9" fill="#888">  Plaintext user + password</text>

  <!-- Exercise D — TCP Stream -->
  <rect x="636" y="508" width="178" height="100" rx="6" fill="#ffffff" stroke="#ff6d00" stroke-width="1.5"/>
  <rect x="636" y="508" width="178" height="22" rx="6" fill="#ff6d00"/>
  <text x="725" y="523" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Exercise D — TCP Stream</text>
  <text x="652" y="546" font-size="9" fill="#333">🔍 Follow → TCP Stream</text>
  <text x="652" y="560" font-size="9" fill="#555">  Right-click any HTTP packet</text>
  <text x="652" y="574" font-size="9" fill="#333">📄 Red = request · Blue = response</text>
  <text x="652" y="588" font-size="9" fill="#888">  Full session reconstruction</text>

  <!-- Connector lines: NIC root → exercises -->
  <line x1="460" y1="482" x2="460" y2="500" stroke="#34a853" stroke-width="1.5"/>
  <line x1="131" y1="500" x2="725" y2="500" stroke="#34a853" stroke-width="1.5"/>
  <line x1="131" y1="500" x2="131" y2="508" stroke="#1a73e8" stroke-width="1.5"/>
  <line x1="329" y1="500" x2="329" y2="508" stroke="#34a853" stroke-width="1.5"/>
  <line x1="527" y1="500" x2="527" y2="508" stroke="#ea4335" stroke-width="1.5"/>
  <line x1="725" y1="500" x2="725" y2="508" stroke="#ff6d00" stroke-width="1.5"/>

  <!-- Arrow: VM → Analysis Pipeline -->
  <line x1="308" y1="356" x2="460" y2="448" stroke="#34a853" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="340" y="408" font-size="9" fill="#34a853" font-weight="600">Captures traffic</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34a853"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9c27b0"/>
    </marker>
  </defs>

</svg>
